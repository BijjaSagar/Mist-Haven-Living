name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci
      - run: npm run build
      - run: npm run package:deploy -- next-build.zip
      - run: CHECK_LIVE=0 npm run verify:deploy

      - uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: next-build.zip
          retention-days: 14

  deploy:
    needs: build
    if: vars.HOSTINGER_AUTO_DEPLOY == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: next-build

      - name: Upload zip to Hostinger
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_SSH_PORT || 65002 }}
          source: next-build.zip
          target: ${{ secrets.HOSTINGER_APP_PATH || '~/domains/mistandhaven.com/app' }}

      - name: Extract bundle on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_SSH_PORT || 65002 }}
          script: |
            set -e
            APP="${{ secrets.HOSTINGER_APP_PATH || '~/domains/mistandhaven.com/app' }}"
            cd "$APP"
            git pull origin main || true
            if [[ -f scripts/server-deploy.sh ]]; then
              bash scripts/server-deploy.sh next-build.zip
            else
              echo "WARN: scripts/server-deploy.sh missing — inline deploy with upload backup"
              STANDALONE=".next/standalone"
              BACKUP=""
              if [[ -d "$STANDALONE/public/uploads" ]] && [[ -n "$(ls -A "$STANDALONE/public/uploads" 2>/dev/null || true)" ]]; then
                BACKUP="$(mktemp -d)"
                cp -a "$STANDALONE/public/uploads/." "$BACKUP/"
              elif [[ -d public/uploads ]] && [[ -n "$(ls -A public/uploads 2>/dev/null || true)" ]]; then
                BACKUP="$(mktemp -d)"
                cp -a public/uploads/. "$BACKUP/"
              fi
              mkdir -p "$STANDALONE"
              unzip -o next-build.zip -d "$STANDALONE/"
              if [[ -n "$BACKUP" ]]; then
                mkdir -p "$STANDALONE/public/uploads"
                cp -an "$BACKUP/." "$STANDALONE/public/uploads/" 2>/dev/null || cp -a "$BACKUP/." "$STANDALONE/public/uploads/"
                rm -rf "$BACKUP"
              fi
              mkdir -p "$STANDALONE/public/uploads"
              if [[ -d public/uploads ]]; then
                cp -an public/uploads/. "$STANDALONE/public/uploads/" 2>/dev/null || cp -a public/uploads/. "$STANDALONE/public/uploads/" 2>/dev/null || true
              fi
              mkdir -p ~/public_html
              rm -rf ~/public_html/uploads
              ln -sfn "$(pwd)/$STANDALONE/public/uploads" ~/public_html/uploads
              mkdir -p ~/public_html/_next
              rm -rf ~/public_html/_next/static
              ln -sfn "$(pwd)/$STANDALONE/.next/static" ~/public_html/_next/static
            fi
            echo "Done. Restart Node.js app in hPanel if the site does not update."
