name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci
      - run: npm run build
      - run: npm run package:deploy -- next-build.zip
      - run: CHECK_LIVE=0 npm run verify:deploy

      - uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: next-build.zip
          retention-days: 14

  deploy:
    needs: build
    if: vars.HOSTINGER_AUTO_DEPLOY == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: next-build

      - name: Upload zip and deploy scripts to Hostinger
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_SSH_PORT || 65002 }}
          source: "next-build.zip,scripts/server-deploy.sh,scripts/setup-hostinger-uploads.sh,scripts/setup-hostinger-static.sh,scripts/health-check-uploads.sh,scripts/lib/hostinger-paths.sh"
          target: ${{ secrets.HOSTINGER_APP_PATH || '~/domains/mistandhaven.com/nodejs' }}

      - name: Extract bundle on server (persistent uploads)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_SSH_PORT || 65002 }}
          script: |
            set -euo pipefail
            APP="${{ secrets.HOSTINGER_APP_PATH || '~/domains/mistandhaven.com/nodejs' }}"
            cd "$APP"

            # scp-action may place scripts at app root or under scripts/ — normalize layout.
            mkdir -p scripts/lib
            for f in server-deploy.sh setup-hostinger-uploads.sh setup-hostinger-static.sh health-check-uploads.sh; do
              if [[ -f "$f" ]] && [[ ! -f "scripts/$f" ]]; then
                mv "$f" "scripts/$f"
              fi
            done
            if [[ -f hostinger-paths.sh ]] && [[ ! -f scripts/lib/hostinger-paths.sh ]]; then
              mv hostinger-paths.sh scripts/lib/hostinger-paths.sh
            fi
            chmod +x scripts/*.sh 2>/dev/null || true

            if [[ ! -f scripts/server-deploy.sh ]]; then
              echo "ERROR: scripts/server-deploy.sh missing after upload — cannot deploy safely" >&2
              exit 1
            fi

            # Optional: refresh other repo files when app root is a git clone.
            if [[ -d .git ]]; then
              git pull origin main || true
            fi

            bash scripts/server-deploy.sh next-build.zip

            echo "Done. Restart Node.js app in hPanel if the site does not update."
